<body>

<div class="container">

<img id="painel" src="ActionRollPicture.png">


<label>


<input id="voFisico" type="number" value="4">

<input id="radioFisico" type="radio" name="vo" value="fisico" checked>

</label>

<label>



<input id="voSocial" type="number" value="4">

<input id="radioSocial" type="radio" name="vo" value="social">

</label>

<label>


<input id="voMental" type="number" value="4">

<input id="radioMental" type="radio" name="vo" value="mental">

</label>



<label>



<input id="atributo" type="number" value="0">

</label>

<label>



<input id="bonus" type="number" value="0">

</label>


<button onclick="rolar()">


</button>

<input id="dadoAcao" type="text" readonly>

<input id="desafio1" type="text" readonly>

<input id="desafio2" type="text" readonly>

<input id="actionRoll" type="text" readonly>

<input id="voSelecionado" type="text" readonly>



<hr>

<h2>Trilhas de Progresso</h2>

<h3>Personagem</h3>

<div id="trilhaPersonagem"></div>

<br>

<h3>Adversário</h3>

<label>


<select id="tipoAdversario" onchange="criarTrilhaAdversario()">

<option value="4">Fraco</option>

<option value="6" selected>Comum</option>

<option value="8">Perigoso</option>

<option value="10">Chefão</option>

</select>

</label>

<br><br>

<div id="trilhaAdversario"></div>

<hr>

<div id="resultado">

Aguardando rolagem...

</div>

</div>

<script>

function d6(){

    return Math.floor(Math.random()*6)+1;

}

function d10(){

    return Math.floor(Math.random()*10)+1;

}

function rolar(){

    let atributo=parseInt(document.getElementById("atributo").value)||0;

    let bonus=parseInt(document.getElementById("bonus").value)||0;

    let voSelecionado=document.querySelector("input[name=vo]:checked").value;

    let vo;

    if(voSelecionado=="fisico"){

        vo=parseInt(document.getElementById("voFisico").value);

    }

    if(voSelecionado=="social"){

        vo=parseInt(document.getElementById("voSocial").value);

    }

    if(voSelecionado=="mental"){

        vo=parseInt(document.getElementById("voMental").value);

    }

    let dadoAcao=d6();

    let desafio1=d10();

    let desafio2=d10();

    let actionRoll=dadoAcao+atributo+bonus;

    let sucessos=0;

    if(actionRoll>desafio1) sucessos++;

    if(actionRoll>desafio2) sucessos++;

    let tipo="";

    if(sucessos==2){

        tipo="Strong Hit";

    }else if(sucessos==1){

        tipo="Weak Hit";

    }else{

        tipo="Miss";

    }

    let venceuVO=actionRoll>vo;

    document.getElementById("dadoAcao").value = dadoAcao;

    document.getElementById("desafio1").value = desafio1;

    document.getElementById("desafio2").value = desafio2;

    document.getElementById("actionRoll").value = actionRoll;

    document.getElementById("voSelecionado").value = vo;

    let texto="<div class='tituloResultado'>"+tipo+"</div>";

    texto+="<p>";

    texto+=venceuVO?

    "Action Roll venceu o VO.<br>":

    "Action Roll NÃO venceu o VO.<br>";

    if(tipo=="Strong Hit"){

        if(venceuVO){

            texto+="Resultado 1<br>";

            texto+="✔ Marque <b>2 segmentos do adversário.</b>";

        }else{

            texto+="Resultado 2<br><br>";

            texto+="➜ Nenhum segmento é marcado.";

        }

    }

    if(tipo=="Weak Hit"){

        if(venceuVO){

            texto+="Resultado 3<br>";

            texto+="✔ Marque 1 segmento do adversário.<br>";

            texto+="✔ Marque 1 segmento do personagem.";

        }else{

            texto+="Resultado 4<br>";

            texto+="✔ Marque 1 segmento do adversário.<br>";

            texto+="✔ Marque 2 segmentos do personagem.";

        }

    }

    if(tipo=="Miss"){

        if(venceuVO){

            texto+="Resultado 5<br>";

            texto+="✔ Marque 1 segmento do personagem.";

        }else{

            texto+="Resultado 6<br>";

            texto+="✔ Marque 2 segmentos do personagem.";

        }

    }

    texto+="</p>";

    document.getElementById("resultado").innerHTML=texto;

}

function criarTrilha(id,total){

let div=document.getElementById(id);

div.innerHTML="";

div.className="trilha";

for(let i=0;i<total;i++){

let s=document.createElement("div");

s.className="segmento";

s.onclick=function(){

s.classList.toggle("preenchido");

};

div.appendChild(s);

}

}

function criarTrilhaAdversario(){

let total=parseInt(

document.getElementById("tipoAdversario").value

);

criarTrilha("trilhaAdversario",total);

}

criarTrilha("trilhaPersonagem",6);

criarTrilhaAdversario();

</script>


<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>

</html>
